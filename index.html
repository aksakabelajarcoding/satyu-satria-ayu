<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aroganzz Music - Beyond Limits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Circular+Std:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .spot-gradient { background: linear-gradient(180deg, #222222 0%, #000000 100%); }
        .search-bar { background: #242424; transition: all 0.3s ease; border: 1px solid transparent; }
        .search-bar:focus-within { background: #2a2a2a; border-color: #1DB954; box-shadow: 0 0 15px rgba(29, 185, 84, 0.3); }
        .music-card { background: #181818; border-radius: 12px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .music-card:hover { background: #282828; transform: translateY(-8px); }
        .play-btn { background: #1DB954; box-shadow: 0 8px 15px rgba(0,0,0,0.5); opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }
        .music-card:hover .play-btn { opacity: 1; transform: translateY(0); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #1DB954; }
    </style>
</head>
<body class="min-h-screen">

    <div class="flex">
        <aside class="hidden lg:flex w-64 bg-black h-screen sticky top-0 flex-col p-6 gap-6 border-r border-zinc-800">
            <h1 class="text-2xl font-black text-white flex items-center gap-2 italic">
                <span class="text-green-500">☠️</span> AROGANZZ
            </h1>
            <nav class="space-y-4 text-zinc-400 font-bold">
                <div class="flex items-center gap-4 hover:text-white cursor-pointer transition"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M12.5 3.553L5 8V19h14V8l-6.5-4.447a.5.5 0 00-.5 0zM11 20H4V7.197L11.44.88a1 1 0 011.12 0L20 7.197V20h-7v-6h-2v6z"/></svg> Home</div>
                <div class="flex items-center gap-4 text-white cursor-pointer"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M10.533 1.279c-5.18 0-9.407 4.14-9.407 9.279s4.226 9.279 9.407 9.279c2.234 0 4.29-.77 5.907-2.046l4.275 4.276a.75.75 0 001.06-1.06l-4.249-4.248a9.195 9.195 0 002.414-6.201c0-5.138-4.227-9.279-9.407-9.279zm-7.907 9.279c0-4.315 3.54-7.779 7.907-7.779s7.907 3.464 7.907 7.779-3.54 7.779-7.907 7.779-7.907-3.464-7.907-7.779z"/></svg> Search</div>
            </nav>
        </aside>

        <main class="flex-1 spot-gradient p-4 md:p-8">
            <header class="flex justify-between items-center mb-10">
                <div class="search-bar flex items-center px-4 py-2 rounded-full w-full max-w-md">
                    <svg class="text-zinc-400" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input id="searchInput" type="text" placeholder="Apa yang ingin kamu dengar? 😈" 
                        class="bg-transparent border-none text-white px-3 py-1 w-full outline-none text-sm font-medium">
                </div>
                <button onclick="searchMusic()" class="bg-white text-black font-extrabold px-6 py-2 rounded-full hover:scale-105 transition active:scale-95 ml-4">
                    CARI ☠️
                </button>
            </header>

            <div id="status" class="hidden text-zinc-500 font-bold text-center py-20 text-xl tracking-widest">
                NYARI DATA DI DARK WEB... 🤑💀
            </div>

            <div id="results" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
                </div>
        </main>
    </div>

    <script>
        async function searchMusic() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            
            const resultsDiv = document.getElementById('results');
            const status = document.getElementById('status');
            
            resultsDiv.innerHTML = '';
            status.classList.remove('hidden');
            status.innerHTML = `<span class="animate-pulse">BYPASSING FIREWALL... ⚡</span>`;

            try {
                // NEW ENGINE: Pake proxy scraper yang lebih bandel
                const response = await fetch(`https://api.vytub.com/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                status.classList.add('hidden');

                if(!data || data.length === 0) {
                    status.classList.remove('hidden');
                    status.innerText = "KAGA ADA HASILNYA NYET! 😤";
                    return;
                }

                data.forEach(track => {
                    resultsDiv.innerHTML += `
                        <div class="music-card p-4 group cursor-pointer" onclick="window.open('https://9xbuddy.com/process?url=${track.url}', '_blank')">
                            <div class="relative aspect-square mb-4 overflow-hidden rounded-md shadow-2xl">
                                <img src="${track.thumbnail}" class="w-full h-full object-cover">
                                <div class="play-btn absolute bottom-3 right-3 p-3 rounded-full">
                                    <svg width="24" height="24" fill="black" viewBox="0 0 24 24"><path d="M7 6v12l10-6z"/></svg>
                                </div>
                            </div>
                            <h3 class="text-white font-bold truncate text-sm mb-1">${track.title}</h3>
                            <p class="text-zinc-400 text-xs truncate uppercase font-semibold">${track.author}</p>
                            <div class="mt-3 text-[10px] text-green-500 font-black tracking-widest opacity-0 group-hover:opacity-100 transition">
                                SIKAT SEKARANG 🤑☠️
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                status.classList.remove('hidden');
                status.innerHTML = `SERVER LAGI DOWN PARAH! 💀<br><span class="text-sm font-normal">Coba lagi ntar, atau ganti provider net lu!</span>`;
            }
        }
    </script>
</body>
</html>
