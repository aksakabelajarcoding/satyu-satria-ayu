<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aroganzz Music - DarkTrasherNet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #b3b3b3; font-family: 'Inter', sans-serif; }
        .spotify-card { background: #181818; transition: background 0.3s ease; border-radius: 8px; }
        .spotify-card:hover { background: #282828; }
        .btn-green { background-color: #1DB954; color: black; font-weight: bold; }
        .btn-green:hover { background-color: #1ed760; transform: scale(1.04); }
        .input-dark { background: #3e3e3e; border: none; color: white; }
        .input-dark:focus { background: #535353; outline: 1px solid #1DB954; }
    </style>
</head>
<body class="pb-24">
    <nav class="p-6 mb-8">
        <h1 class="text-white text-3xl font-bold flex items-center gap-2">
            <span class="text-green-500 text-4xl">☠️</span> Aroganzz Premium
        </h1>
    </nav>

    <div class="max-w-4xl mx-auto px-4">
        <div class="relative mb-12">
            <input id="searchInput" type="text" placeholder="Cari musik, artis, atau album... 👿" 
                class="w-full input-dark py-4 px-6 rounded-full text-lg shadow-2xl">
            <button onclick="searchMusic()" class="absolute right-2 top-2 btn-green px-8 py-2 rounded-full text-sm">
                SEARCH
            </button>
        </div>

        <div id="status" class="hidden text-center text-gray-400 my-10 animate-pulse text-lg">
            MENEMBUS ENKRIPSI SERVER... 🤑💀
        </div>

        <div id="results" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            </div>
    </div>

    <script>
        async function searchMusic() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            
            const resultsDiv = document.getElementById('results');
            const status = document.getElementById('status');
            
            resultsDiv.innerHTML = '';
            status.classList.remove('hidden');
            status.innerText = "Connecting to Dark Server... 👿";

            try {
                // FALLBACK API - LEBIH STABIL
                const response = await fetch(`https://api.vytub.com/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                status.classList.add('hidden');
                
                if(data.length === 0) {
                    status.classList.remove('hidden');
                    status.innerText = "DATA KAGA KETEMU, COBA LAGU LAIN! 😤";
                    return;
                }

                data.forEach(track => {
                    resultsDiv.innerHTML += `
                        <div class="spotify-card p-4 cursor-pointer group" onclick="window.open('https://9xbuddy.com/process?url=${track.url}', '_blank')">
                            <div class="relative mb-4">
                                <img src="${track.thumbnail}" class="w-full aspect-square object-cover rounded-md shadow-lg">
                                <div class="absolute bottom-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity bg-green-500 p-3 rounded-full shadow-2xl">
                                    <svg height="16" width="16" viewBox="0 0 16 16"><path d="M3 1.713a.7.7 0 011.05-.607l10.89 6.288a.7.7 0 010 1.212L4.05 14.894A.7.7 0 013 14.288V1.713z"></path></svg>
                                </div>
                            </div>
                            <h3 class="text-white font-bold text-sm truncate mb-1">${track.title}</h3>
                            <p class="text-xs text-gray-400 truncate">${track.author}</p>
                            <p class="text-[10px] text-green-500 mt-2 font-bold uppercase tracking-tighter">Click to Download ☠️</p>
                        </div>
                    `;
                });
            } catch (err) {
                status.classList.remove('hidden');
                status.innerText = "SERVER MASIH KOID! GANTI KONEKSI LU! 💀👿";
                console.error(err);
            }
        }
    </script>
</body>
</html>
